name: Foundation

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: foundation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Foundation checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Require committed Bun lockfile
        run: test -f bun.lock

      - name: Install dependencies
        run: bun ci

      - name: Check formatting
        run: bun run format:check

      - name: Check committed secrets
        run: bun run check:secrets

      - name: Check local SQLite schema drift
        run: bun run check:sqlite-schema

      - name: Check local SQLite migration ordering
        run: bun run check:sqlite-migrations

      - name: Check forbidden foundation patterns
        run: bun run check:patterns

      - name: Check tier UI sources
        run: bun run check:tier-ui-sources

      - name: Check doc link integrity
        run: bun run check:doc-links

      - name: Check skill-doc gate (DocGate-3)
        run: bun run check:skill-docs

      - name: Check Expo doctor
        run: bun run check:expo-doctor

      - name: Check mobile Android bundle
        run: bun run check:mobile-bundle

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test
