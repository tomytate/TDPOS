project_id = "tdpos-local"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
health_timeout = "2m"
major_version = 17

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["http://localhost:3000"]
enable_signup = true

[auth.sms]
enable_signup = true
enable_confirmations = false
template = "Your TD POS code is {{ .Code }}"
max_frequency = "5s"

[auth.sms.test_otp]
639171234567 = "123456"

[storage]
enabled = true
file_size_limit = "50MiB"
